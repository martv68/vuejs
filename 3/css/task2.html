<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 2</title>
    <style>
        body {
            margin: 0;
            font-family: Impact;
        }

        .label {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
        }

        .label::before {
            content: "Desktop";
        }

        @media (max-width: 1024px) {
            .label::before {
                content: "Tablet";
            }
        }

        @media (max-width: 768px) {
            .label::before {
                content: "Mobile";
            }
        }
    </style>
</head>
<body>
    <div class="label"></div>
</body>
</html>
