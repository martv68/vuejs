<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 6</title>
    <style>
        body {
            margin: 0;
            padding: 36px 24px;
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .menu,
        .hero,
        .card,
        .footer {
            background: #eeeeee;
        }

        .menu {
            padding: 12px 16px;
            text-align: center;
            margin-bottom: 14px;
        }

        .menu a {
            margin: 0 8px;
            color: #7c5ea8;
            font-size: 12px;
            text-decoration: underline;
        }

        .hero {
            min-height: 150px;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 18px;
            font-size: 14px;
        }

        .cards {
            display: flex;
            gap: 14px;
            margin-bottom: 14px;
        }

        .card {
            flex: 1;
            min-height: 120px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 16px;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 14px;
        }

        @media (max-width: 700px) {
            .cards {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="logo">Логотип</div>

        <div class="menu">
            <a href="#">Домой</a>
            <a href="#">Товары</a>
            <a href="#">Услуги</a>
            <a href="#">О нас</a>
            <a href="#">Контакты</a>
        </div>

        <div class="hero">Характеристика</div>

        <div class="cards">
            <div class="card">Колонка 1</div>
            <div class="card">Колонка 2</div>
            <div class="card">Колонка 3</div>
        </div>

        <div class="footer">© МЕРНІ 2023</div>
    </div>
</body>
</html>
