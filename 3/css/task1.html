<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1</title>
    <style>
        body {
            margin: 0;
            padding: 22px 30px 10px;
            font-family: "Times New Roman", serif;
            line-height: 1.5;
        }

        .page {
            width: 520px;
            margin: 0;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 30px;
        }

        p {
            margin: 0 0 14px;
            font-size: 16px;
        }

        .welcome-line {
            font-size: 15px;
        }

        .red {
            color: #ff0000;
        }

        .blue {
            color: #1e63ff;
        }

        .formula {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .comic-title {
            font-family: "Comic Sans MS";
        }

        table {
            width: 465px;
            border-collapse: collapse;
            font-size: 15px;
        }

        td {
            border: 1px solid #000000;
            padding: 4px 6px;
            background: #27e9ef;
        }

        .old-price {
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Добро пожаловать!</h1>
        <p class="welcome-line">
            <i class="red">П</i><i class="blue">р</i><i class="red">и</i><i class="blue">в</i><i class="red">е</i><i class="blue">т</i><i class="red">с</i><i class="blue">т</i><i class="red">в</i><i class="blue">у</i><i class="red">е</i><i class="blue">м</i>
            <u class="red">в</u><u class="blue">а</u><u class="red">с</u>
            <b class="blue">в </b><b class="red">н</b><b class="blue">а</b><b class="red">ш</b><b class="blue">е</b><b class="red">м</b>
            <a href="http://example.com" target="_blank" rel="noreferrer"> <span>магазине</span></a>!
        </p>
        <p class="formula">&lt;h1&gt;<span class="comic-title">Теорема Пифагора</span>&lt;/h1&gt;: <i>c</i><sup>2</sup> = <i>a</i><sup>2</sup> + <i>b</i><sup>2</sup></p>

        <table>
            <tr>
                <td colspan="2">Информация</td>
            </tr>
            <tr>
                <td>Старая цена: <span class="old-price">1000 ₽</span></td>
                <td>Новая цена: 500 ₽</td>
            </tr>
        </table>
    </div>
</body>
</html>
